<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AV Media Telangana Broadcast Control Panel v1.0</title>
  <link rel="stylesheet" href="./control-panel.css">
</head>
<body>
  <!-- Header Bar -->
  <header class="cp-header">
    <div class="cp-brand">
      AV MEDIA TELANGANA <span class="cp-brand-badge">v1.0</span>
    </div>
    <div class="cp-status-pill">
      <span class="cp-status-dot"></span> LIVE ENGINE ACTIVE
    </div>
  </header>

  <div class="cp-body">
    <!-- Navigation Sidebar -->
    <nav class="cp-sidebar">
      <div class="cp-nav-item" data-tab="dashboard">
        <span>Dashboard</span>
        <span class="cp-badge-small">SOON</span>
      </div>
      <div class="cp-nav-item active" data-tab="ticker">
        <span>Ticker</span>
        <span class="cp-badge-small" style="background:var(--cp-primary-red)">ACTIVE</span>
      </div>
      <div class="cp-nav-item" data-tab="lower-third">
        <span>Lower Third</span>
        <span class="cp-badge-small">SOON</span>
      </div>
      <div class="cp-nav-item" data-tab="breaking">
        <span>Breaking News</span>
        <span class="cp-badge-small">SOON</span>
      </div>
      <div class="cp-nav-item" data-tab="reporter">
        <span>Reporter Card</span>
        <span class="cp-badge-small">SOON</span>
      </div>
      <div class="cp-nav-item" data-tab="settings">
        <span>Control Panel</span>
        <span class="cp-badge-small">SOON</span>
      </div>
    </nav>

    <!-- Main Workspace -->
    <main class="cp-main">
      <div class="cp-card">
        <div class="cp-card-title">
          <span>📺 Ticker Broadcast Controller</span>
        </div>

        <!-- Headline Input -->
        <div class="cp-form-group">
          <label class="cp-label" for="headline-input">Headline Text (ప్రధాన వార్తలు)</label>
          <textarea id="headline-input" class="cp-textarea" placeholder="వార్తలను ఇక్కడ నమోదు చేయండి (లైనుకు ఒక వార్త)..."></textarea>
        </div>

        <!-- Category & Theme Row -->
        <div class="cp-row">
          <div class="cp-form-group">
            <label class="cp-label" for="category-select">Category (వర్గం)</label>
            <select id="category-select" class="cp-select">
              <option value="తాజా వార్తలు">తాజా వార్తలు (General)</option>
              <option value="రాజకీయం">రాజకీయం (Politics)</option>
              <option value="క్రైమ్">క్రైమ్ (Crime)</option>
              <option value="క్రీడలు">క్రీడలు (Sports)</option>
              <option value="వాతావరణం">వాతావరణం (Weather)</option>
            </select>
          </div>

          <div class="cp-form-group">
            <label class="cp-label" for="theme-select">Theme (థీమ్)</label>
            <select id="theme-select" class="cp-select">
              <option value="default">Default Theme (సాధారణ థీమ్)</option>
              <option value="breaking">Breaking Red (అత్యవసర వర్తమానం)</option>
            </select>
          </div>

          <div class="cp-form-group">
            <label class="cp-label" for="speed-select">Speed (వేగం)</label>
            <select id="speed-select" class="cp-select">
              <option value="medium">Medium (సాధారణ)</option>
              <option value="slow">Slow (నెమ్మదిగా)</option>
              <option value="fast">Fast (వేగంగా)</option>
            </select>
          </div>
        </div>

        <!-- Playback Controls -->
        <div class="cp-row">
          <div class="cp-btn-group">
            <button id="btn-pause" class="cp-btn cp-btn-secondary">⏸️ Pause Ticker</button>
            <button id="btn-play" class="cp-btn cp-btn-secondary">▶️ Resume Ticker</button>
          </div>
        </div>

        <!-- Local Preview -->
        <div class="cp-form-group">
          <label class="cp-label">Local Preview Window</label>
          <div class="cp-preview-box">
            <div id="preview-badge" class="cp-preview-badge">తాజా వార్తలు</div>
            <div id="preview-text" class="cp-preview-text">మారిన వివరాలు చూడటానికి Preview బటన్ నొక్కండి...</div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="cp-btn-group">
          <button id="btn-preview" class="cp-btn cp-btn-gold">👁️ Preview</button>
          <button id="btn-reset" class="cp-btn cp-btn-secondary">🔄 Reset</button>
          <button id="btn-golive" class="cp-btn cp-btn-golive" style="flex:2;">🔴 GO LIVE (ON-AIR)</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./control-panel.js"></script>
</body>
</html>
