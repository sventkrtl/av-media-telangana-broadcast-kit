<!DOCTYPE html>
<html lang="te">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AV Media Telangana - Primary Headline Overlay</title>
  <link rel="stylesheet" href="./primary-headline.css">
</head>
<body>
  <!-- 1920x1080 OBS Broadcast Canvas -->
  <div id="ph-overlay" class="ph-overlay-canvas">
    <!-- Primary Area: Absolute 1920x135 at X:0, Y:890, Bottom:1025 -->
    <div id="ph-container" class="ph-container">
      <!-- Blue Background Bar (Always Blue) -->
      <div id="ph-blue-bar" class="ph-blue-bar">
        <!-- Viewport: clip-path / opacity animation layer ONLY -->
        <div id="ph-headline-viewport" class="ph-headline-viewport">
          <!-- Text: pure glyph rendering layer — no clip-path, overflow: visible -->
          <div id="ph-headline-text" class="ph-headline-text">హెడ్‌లైన్స్ ప్రారంభమౌతున్నాయి...</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./primary-headline.js"></script>
</body>
</html>
